<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCALETTA - tRIO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --grigio-tortora: #8e8781;
            --rosa-pastello: #f4cfdf;
            --blu-pastello: #b1dafb;
            --bianco: #fdfdfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--grigio-tortora);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        header {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-style: italic;
            margin: 0;
            color: #4a4541;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
        }

        .timer-box, .total-time-box {
            background: #eee;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
        }

        #searchBar {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 25px;
            border: none;
            box-sizing: border-box;
        }

        .btn {
            background-color: #4a4541;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .song-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .song-card:hover { transform: scale(1.02); }

        /* Modal / Pagina Dettaglio */
        #editorPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bianco);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #lyricsArea {
            width: 100%;
            height: 300px;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            white-space: pre-wrap;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            touch-action: none;
        }

        .toolbar {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<div id="homePage">
    <header>
        <h1>SCALETTA - tRIO</h1>
        <div class="stats-bar">
            <div class="timer-box">Timer: <span id="timerDisplay">00:00:00</span></div>
            <div class="total-time-box">Totale Scaletta: <span id="totalDuration">0</span> min</div>
        </div>
        <button class="btn" onclick="startTimer()">Start Concerto</button>
    </header>

    <input type="text" id="searchBar" placeholder="Cerca brano..." onkeyup="filterSongs()">
    
    <button class="btn" style="width: 100%; margin-bottom: 20px;" onclick="openEditor()">+ Inserisci Nuovo Brano</button>

    <div id="songList">
        </div>
</div>

<div id="editorPage">
    <button class="btn" onclick="closeEditor()">← Torna Indietro</button>
    <h2 id="editorTitle">Nuovo Brano</h2>
    
    <input type="text" id="inTitolo" placeholder="Titolo">
    <input type="text" id="inAutore" placeholder="Autore">
    <input type="text" id="inTonalita" placeholder="Tonalità">
    <input type="number" id="inDurata" placeholder="Durata (min)">
    
    <div class="toolbar">
        <button class="btn" style="background:var(--blu-pastello); color:black" onclick="setHighlight('var(--blu-pastello)')">Evidenziatore Blu</button>
        <button class="btn" style="background:var(--rosa-pastello); color:black" onclick="setHighlight('var(--rosa-pastello)')">Evidenziatore Rosa</button>
        <button class="btn" onclick="setTool('pen')">🖋️ Penna</button>
        <button class="btn" onclick="setTool('eraser')">🧽 Gomma</button>
        <button class="btn" onclick="clearCanvas()">Pulisci Note</button>
    </div>

    <div id="lyricsArea">
        <textarea id="textContent" style="width:100%; height:100%; border:none; background:transparent;" placeholder="Scrivi il testo qui..."></textarea>
        <canvas id="drawingCanvas"></canvas>
    </div>

    <button class="btn" style="margin-top:20px; background:green;" onclick="saveSong()">SALVA E PUBBLICA</button>
</div>

<script>
    // --- CONFIGURAZIONE FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://scaletta-rio-2026-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let songs = [];
    let currentSongId = null;
    let timerInterval;

    // --- LOGICA TIMER ---
    function startTimer() {
        let seconds = 0;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds++;
            let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    // --- GESTIONE DATABASE ---
    function loadSongs() {
        db.ref('songs').on('value', (snapshot) => {
            const data = snapshot.val();
            songs = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
            renderSongs();
        });
    }

    function renderSongs() {
        const list = document.getElementById('songList');
        let totalMin = 0;
        list.innerHTML = '';
        
        songs.forEach(s => {
            totalMin += parseInt(s.durata || 0);
            list.innerHTML += `
                <div class="song-card" onclick="openEditor('${s.id}')">
                    <strong>${s.titolo}</strong>
                    <span>${s.autore}</span>
                    <span>${s.tonalita}</span>
                    <span>${s.durata}'</span>
                </div>
            `;
        });
        document.getElementById('totalDuration').innerText = totalMin;
    }

    function saveSong() {
        const songData = {
            titolo: document.getElementById('inTitolo').value,
            autore: document.getElementById('inAutore').value,
            tonalita: document.getElementById('inTonalita').value,
            durata: document.getElementById('inDurata').value,
            testo: document.getElementById('textContent').value,
            disegno: canvas.toDataURL() // Salva i tratti della Apple Pencil
        };

        if(currentSongId) {
            db.ref('songs/' + currentSongId).set(songData);
        } else {
            db.ref('songs').push(songData);
        }
        closeEditor();
    }

    // --- EDITOR & CANVAS (APPLE PENCIL) ---
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let tool = 'pen';

    function openEditor(id = null) {
        currentSongId = id;
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('editorPage').style.display = 'block';
        
        // Resize canvas
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;

        if(id) {
            const s = songs.find(x => x.id === id);
            document.getElementById('inTitolo').value = s.titolo;
            document.getElementById('inAutore').value = s.autore;
            document.getElementById('inTonalita').value = s.tonalita;
            document.getElementById('inDurata').value = s.durata;
            document.getElementById('textContent').value = s.testo;
            if(s.disegno) {
                let img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = s.disegno;
            }
        } else {
            // Reset campi per nuova canzone
            document.querySelectorAll('#editorPage input, #editorPage textarea').forEach(i => i.value = '');
            ctx.clearRect(0,0, canvas.width, canvas.height);
        }
    }

    function closeEditor() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('editorPage').style.display = 'none';
    }

    function setTool(t) { tool = t; ctx.globalCompositeOperation = (t === 'eraser') ? 'destination-out' : 'source-over'; ctx.strokeStyle = 'black'; ctx.lineWidth = 2; }
    function setHighlight(color) { 
        document.getElementById('textContent').style.backgroundColor = color;
    }

    // Eventi Disegno
    canvas.addEventListener('pointerdown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('pointermove', (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
    canvas.addEventListener('pointerup', () => drawing = false);

    function clearCanvas() { ctx.clearRect(0,0, canvas.width, canvas.height); }

    loadSongs();
</script>

</body>
</html>
