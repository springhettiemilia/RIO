<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCALETTA - tRIO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --grigio-tortora: #8e8781;
            --rosa-pastello: #f4cfdf;
            --blu-pastello: #b1dafb;
            --bianco: #fdfdfd;
            --scuro: #4a4541;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--grigio-tortora);
            margin: 0; padding: 15px; color: #333;
        }

        header {
            text-align: center; background: white; padding: 15px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { font-family: 'Georgia', serif; font-style: italic; color: var(--scuro); margin: 0; }

        .stats-bar { display: flex; justify-content: space-around; margin-top: 10px; }
        .timer-box, .total-time-box { background: #f0f0f0; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 0.9em; }

        #searchBar {
            width: 100%; padding: 12px; margin: 15px 0;
            border-radius: 25px; border: none; outline: none; box-sizing: border-box;
        }

        .btn {
            background-color: var(--scuro); color: white; border: none;
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 14px;
        }

        .song-card {
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 5px;
            cursor: pointer; align-items: center;
        }

        /* Pagina Editor */
        #editorPage {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bianco); z-index: 100; overflow-y: auto; padding: 15px; box-sizing: border-box;
        }

        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; min-width: 120px; }

        /* Contenitore Testo e Canvas */
        #lyricsContainer {
            position: relative; width: 100%; height: 60vh; border: 1px solid #ccc;
            border-radius: 10px; overflow: hidden; background: white;
        }

        #textContent {
            width: 100%; height: 100%; padding: 15px; border: none;
            font-size: 18px; line-height: 1.5; resize: none; box-sizing: border-box;
            outline: none;
        }

        #drawingCanvas {
            position: absolute; top: 0; left: 0;
            pointer-events: none; /* Disattivato di default */
            touch-action: none;
        }

        #drawingCanvas.active {
            pointer-events: auto; /* Attivato solo su richiesta */
            cursor: crosshair;
        }

        .toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .active-tool { border: 2px solid black !important; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="homePage">
    <header>
        <h1>SCALETTA - tRIO</h1>
        <div class="stats-bar">
            <div class="timer-box">Timer: <span id="timerDisplay">00:00:00</span></div>
            <div class="total-time-box">Totale: <span id="totalDuration">0</span> min</div>
        </div>
        <button class="btn" style="margin-top:10px;" onclick="toggleTimer()">Start/Stop Concerto</button>
    </header>

    <input type="text" id="searchBar" placeholder="Cerca titolo o autore..." onkeyup="renderSongs()">
    <button class="btn" style="width: 100%; margin-bottom: 15px;" onclick="openEditor()">+ AGGIUNGI CANZONE</button>
    <div id="songList"></div>
</div>

<div id="editorPage">
    <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
        <button class="btn" onclick="closeEditor()">← Chiudi</button>
        <button class="btn" style="background: #28a745;" onclick="saveSong()">SALVA TUTTO</button>
    </div>

    <div class="input-group">
        <input type="text" id="inTitolo" placeholder="Titolo">
        <input type="text" id="inAutore" placeholder="Autore">
        <input type="text" id="inTonalita" placeholder="Tonalità">
        <input type="number" id="inDurata" placeholder="Durata (min)">
    </div>

    <div class="toolbar">
        <button class="btn" style="background:var(--blu-pastello); color:black" onclick="setHighlight('var(--blu-pastello)')">Evidenzia Blu</button>
        <button class="btn" style="background:var(--rosa-pastello); color:black" onclick="setHighlight('var(--rosa-pastello)')">Evidenzia Rosa</button>
        <button id="btnPencil" class="btn" onclick="togglePencilMode()">✍️ Attiva Apple Pencil</button>
        <button class="btn" onclick="setTool('eraser')">🧽 Gomma</button>
        <button class="btn" onclick="clearCanvas()">Svuota Note</button>
    </div>

    <div id="lyricsContainer">
        <textarea id="textContent" placeholder="Scrivi il testo della canzone qui..."></textarea>
        <canvas id="drawingCanvas"></canvas>
    </div>
</div>

<script>
    // Configurazione Database
    const firebaseConfig = { databaseURL: "https://scaletta-rio-2026-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let songs = [];
    let currentSongId = null;
    let timerInterval;
    let seconds = 0;
    let pencilMode = false;

    // Timer
    function toggleTimer() {
        if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        else {
            timerInterval = setInterval(() => {
                seconds++;
                let h=Math.floor(seconds/3600).toString().padStart(2,'0'), m=Math.floor((seconds%3600)/60).toString().padStart(2,'0'), s=(seconds%60).toString().padStart(2,'0');
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }
    }

    // Caricamento Dati
    function loadSongs() {
        db.ref('songs').on('value', (snapshot) => {
            const data = snapshot.val();
            songs = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            renderSongs();
        });
    }

    function renderSongs() {
        const list = document.getElementById('songList');
        const search = document.getElementById('searchBar').value.toLowerCase();
        let total = 0;
        list.innerHTML = '';
        
        songs.filter(s => s.titolo.toLowerCase().includes(search) || s.autore.toLowerCase().includes(search))
        .forEach(s => {
            total += parseInt(s.durata || 0);
            list.innerHTML += `
                <div class="song-card" onclick="openEditor('${s.id}')">
                    <strong>${s.titolo}</strong><span>${s.autore}</span><span>${s.tonalita}</span><span>${s.durata}'</span>
                </div>`;
        });
        document.getElementById('totalDuration').innerText = total;
    }

    // Editor & Pencil
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function togglePencilMode() {
        pencilMode = !pencilMode;
        const btn = document.getElementById('btnPencil');
        if(pencilMode) {
            canvas.classList.add('active');
            btn.innerText = "✅ Penna Attiva";
            btn.classList.add('active-tool');
            setTool('pen');
        } else {
            canvas.classList.remove('active');
            btn.innerText = "✍️ Attiva Apple Pencil";
            btn.classList.remove('active-tool');
        }
    }

    function openEditor(id = null) {
        currentSongId = id;
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('editorPage').style.display = 'block';
        
        canvas.width = document.getElementById('lyricsContainer').offsetWidth;
        canvas.height = document.getElementById('lyricsContainer').offsetHeight;
        pencilMode = false;
        togglePencilMode(); togglePencilMode(); // Reset stato pencil

        if(id) {
            const s = songs.find(x => x.id === id);
            document.getElementById('inTitolo').value = s.titolo;
            document.getElementById('inAutore').value = s.autore;
            document.getElementById('inTonalita').value = s.tonalita;
            document.getElementById('inDurata').value = s.durata;
            document.getElementById('textContent').value = s.testo || "";
            document.getElementById('textContent').style.backgroundColor = s.bg || 'white';
            ctx.clearRect(0,0, canvas.width, canvas.height);
            if(s.disegno) {
                let img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = s.disegno;
            }
        } else {
            document.querySelectorAll('#editorPage input, #textContent').forEach(i => i.value = '');
            document.getElementById('textContent').style.backgroundColor = 'white';
            ctx.clearRect(0,0, canvas.width, canvas.height);
        }
    }

    function saveSong() {
        const songData = {
            titolo: document.getElementById('inTitolo').value || 'Senza Titolo',
            autore: document.getElementById('inAutore').value || '-',
            tonalita: document.getElementById('inTonalita').value || '-',
            durata: document.getElementById('inDurata').value || 0,
            testo: document.getElementById('textContent').value,
            bg: document.getElementById('textContent').style.backgroundColor,
            disegno: canvas.toDataURL()
        };
        if(currentSongId) db.ref('songs/' + currentSongId).set(songData);
        else db.ref('songs').push(songData);
        closeEditor();
    }

    function closeEditor() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('editorPage').style.display = 'none';
    }

    function setHighlight(color) { document.getElementById('textContent').style.backgroundColor = color; }
    
    function setTool(t) {
        ctx.globalCompositeOperation = (t === 'eraser') ? 'destination-out' : 'source-over';
        ctx.strokeStyle = (t === 'eraser') ? 'rgba(0,0,0,1)' : 'black';
        ctx.lineWidth = (t === 'eraser') ? 20 : 2;
    }

    canvas.addEventListener('pointerdown', (e) => { if(!pencilMode) return; drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('pointermove', (e) => { if(drawing && pencilMode) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
    canvas.addEventListener('pointerup', () => drawing = false);
    function clearCanvas() { ctx.clearRect(0,0, canvas.width, canvas.height); }

    loadSongs();
</script>
</body>
</html>
